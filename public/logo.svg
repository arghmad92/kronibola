<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-label="KroniBola">
  <!--
    KroniBola logo — vector reproduction of the original PNG.
    Strokes scale with font size when used as a CSS-styled SVG; the
    outer img-tag use case keeps neon green via stroke="#00FF41".

    Shield: heater-style with the signature double-arched (notched)
    top. Soccer ball: outer circle + central pentagon with five spokes
    referencing the truncated-icosahedron pattern. Lightning bolt:
    classic zig-zag, filled solid for contrast.
  -->
  <g stroke="#00FF41" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Shield outline. Path starts at top-center notch, sweeps up
         and out to each top-bump peak, down both sides, and curves
         to a rounded point at the bottom. -->
    <path d="M 100 38
             C 96 28 86 22 76 22
             C 56 22 38 36 36 56
             L 36 96
             C 36 134 60 162 100 180
             C 140 162 164 134 164 96
             L 164 56
             C 162 36 144 22 124 22
             C 114 22 104 28 100 38 Z" />

    <!-- Soccer ball: outer circle + central pentagon. The pentagon's
         five vertices radiate spokes that suggest the seams of a
         truncated icosahedron without the visual noise of plotting
         every facet. -->
    <circle cx="100" cy="103" r="36" />
    <path d="M 100 80
             L 122 96
             L 113.6 122
             L 86.4 122
             L 78 96 Z" />
    <!-- Spokes from each pentagon vertex toward the outer circle. -->
    <path d="M 100 80 L 100 67" />
    <path d="M 122 96 L 134 90" />
    <path d="M 113.6 122 L 122 134" />
    <path d="M 86.4 122 L 78 134" />
    <path d="M 78 96 L 66 90" />
  </g>

  <!-- Lightning bolt: solid neon for punch against the outlined
       soccer ball behind it. -->
  <path d="M 108 78
           L 90 108
           L 100 108
           L 92 130
           L 116 98
           L 104 98 Z"
        fill="#00FF41" />
</svg>
