name = "kronibola"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

# Auto-close played sessions every 30 minutes
# Note: Cron triggers require a separate Workers deployment.
# For Cloudflare Pages, use the manual API endpoint /api/cron-autoclose
# or deploy _scheduled.js as a standalone Worker with:
#   [triggers]
#   crons = ["*/30 * * * *"]

# Visitor counter KV binding (functions/api/visitors.js).
# This Pages project is set to wrangler.toml-managed bindings, so the
# binding must be declared here rather than in the dashboard UI.
[[kv_namespaces]]
binding = "VISITORS_KV"
id = "d377a5670ddd406dbe91f09de0051494"
