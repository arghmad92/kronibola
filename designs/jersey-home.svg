<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="100%" stop-color="#00cc33"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="18" fill="#666" text-anchor="middle" font-weight="700" letter-spacing="4">HOME JERSEY — FRONT</text>

  <!-- Jersey body -->
  <path d="M260 120 L190 180 L120 170 L80 240 L140 280 L160 250 L170 700 L630 700 L640 250 L660 280 L720 240 L680 170 L610 180 L540 120 Z" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Collar - V-neck with neon trim -->
  <path d="M260 120 L400 200 L540 120" fill="none" stroke="#00FF41" stroke-width="3"/>
  <path d="M265 118 L400 195 L535 118" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.3"/>

  <!-- Shoulder seam lines -->
  <line x1="260" y1="120" x2="190" y2="180" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="540" y1="120" x2="610" y2="180" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Sleeve cuff neon bands -->
  <rect x="132" y="268" width="38" height="5" rx="2" fill="#00FF41"/>
  <rect x="630" y="268" width="38" height="5" rx="2" fill="#00FF41"/>

  <!-- Side stripe - thin neon line -->
  <line x1="175" y1="300" x2="175" y2="695" stroke="#00FF41" stroke-width="2" opacity="0.6"/>
  <line x1="625" y1="300" x2="625" y2="695" stroke="#00FF41" stroke-width="2" opacity="0.6"/>

  <!-- Diagonal geometric accent (subtle) -->
  <path d="M170 400 L300 350 L300 360 L170 410 Z" fill="#00FF41" opacity="0.04"/>
  <path d="M630 400 L500 350 L500 360 L630 410 Z" fill="#00FF41" opacity="0.04"/>

  <!-- Logo area - center chest -->
  <!-- Shield outline -->
  <path d="M370 260 L400 245 L430 260 L430 300 L400 315 L370 300 Z" fill="none" stroke="#00FF41" stroke-width="2"/>
  <circle cx="400" cy="280" r="10" fill="none" stroke="#00FF41" stroke-width="1.5"/>
  <!-- Lightning bolt -->
  <path d="M398 268 L402 278 L397 278 L401 292" fill="none" stroke="#00FF41" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Club name - below logo -->
  <text x="400" y="345" font-family="Arial, sans-serif" font-size="11" fill="#00FF41" text-anchor="middle" font-weight="700" letter-spacing="6" opacity="0.8">KRONIBOLA</text>

  <!-- Number - large center -->
  <text x="400" y="540" font-family="Arial, sans-serif" font-size="140" fill="#00FF41" text-anchor="middle" font-weight="900" opacity="0.12">10</text>

  <!-- Hem neon accent -->
  <rect x="172" y="693" width="456" height="3" rx="1" fill="#00FF41" opacity="0.5"/>

  <!-- ======= BACK ======= -->
  <text x="400" y="770" font-family="Arial, sans-serif" font-size="18" fill="#666" text-anchor="middle" font-weight="700" letter-spacing="4">HOME JERSEY — BACK</text>

  <!-- Back jersey (small preview) -->
  <g transform="translate(200, 790) scale(0.5)">
    <path d="M260 120 L190 180 L120 170 L80 240 L140 280 L160 250 L170 700 L630 700 L640 250 L660 280 L720 240 L680 170 L610 180 L540 120 Z" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Collar back -->
    <path d="M260 120 L400 140 L540 120" fill="#111" stroke="#00FF41" stroke-width="3"/>
    <!-- Side stripes -->
    <line x1="175" y1="300" x2="175" y2="695" stroke="#00FF41" stroke-width="2" opacity="0.6"/>
    <line x1="625" y1="300" x2="625" y2="695" stroke="#00FF41" stroke-width="2" opacity="0.6"/>
    <!-- Player name -->
    <text x="400" y="280" font-family="Arial, sans-serif" font-size="36" fill="#00FF41" text-anchor="middle" font-weight="800" letter-spacing="6">PLAYER</text>
    <!-- Number -->
    <text x="400" y="450" font-family="Arial, sans-serif" font-size="180" fill="#00FF41" text-anchor="middle" font-weight="900">10</text>
    <!-- KRONIBOLA small at bottom -->
    <text x="400" y="640" font-family="Arial, sans-serif" font-size="14" fill="#00FF41" text-anchor="middle" font-weight="700" letter-spacing="4" opacity="0.5">KRONIBOLA</text>
    <rect x="172" y="693" width="456" height="3" rx="1" fill="#00FF41" opacity="0.5"/>
  </g>
</svg>
